<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Navi Ver2.3</title>

<style>
body{
    font-family:sans-serif;
    margin:20px;
    max-width:900px;
}

input{

    padding:8px;
}

button{

</head>
<body>

<h1>Bike Navi Ver2.3</h1>

<input
    type="text"
    id="dest"
    placeholder="目的地を入力">

<button onclick="searchPlace()">
検索
</button>

<div id="gpsInfo">---</div>

デバッグ待機中
</div>

<div id="oledArrow">
↑0m
</div>

<div id="oledSpeed">
0km/h
</div>

</div>
</div>

<div class="section">
<h3>ルート全体</h3>
<div id="routeList">
未取得
</div>
</div>

<script>

const API_KEY = "AIzaSyDm_lAR3kd0a8VAaGdqigrMeCgYTyLVl5I";
let routeSteps = [];
let currentStepIndex = 0;
let destination = null;
let watchId = null;
let currentRoute = null;


const REROUTE_THRESHOLD = 50;
function decodePolyline(encoded) {

    let points = [];

    let index = 0;
    let lat = 0;
    let lng = 0;

    while (index < encoded.length) {

        let b;
        let shift = 0;
        let result = 0;

        do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);

        let dlat =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lat += dlat;

        shift = 0;
        result = 0;

        do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);

        let dlng =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lng += dlng;

        points.push([
            lat / 1e5,
            lng / 1e5
        ]);
    }

    return points;
}

function calculateDistance(
    lat1,
    lng1,
    lat2,
    lng2
){

    const R = 6371000;

    const dLat =
        (lat2-lat1)
        * Math.PI / 180;

    const dLng =
        (lng2-lng1)
        * Math.PI / 180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180)

        *

        Math.cos(lat2*Math.PI/180)

        *

        Math.sin(dLng/2)

        *

        Math.sin(dLng/2);

    return R *
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );
}
function getRemainingDistanceToStep(
    lat,
    lng,
    step
){

    const encoded =
        step.polyline
        ?.encodedPolyline;

    if(!encoded){

        return step.distanceMeters;
    }

    const points =
        decodePolyline(
            encoded
        );

    let nearestIndex = 0;

    let minDistance =
        Number.MAX_VALUE;

    points.forEach(
        (point,index)=>{

            const d =
                calculateDistance(
                    lat,
                    lng,

                    point[0],
                    point[1]
                );

            if(d < minDistance){

                minDistance = d;

                nearestIndex =
                    index;
            }

        }
    );

    let remain = 0;

    for(
        let i=nearestIndex;
        i<points.length-1;
        i++
    ){

        remain +=
            calculateDistance(

                points[i][0],
                points[i][1],

                points[i+1][0],
                points[i+1][1]
            );

    }

    return Math.round(
        remain
    );
}
function updateCurrentStep(
    lat,
    lng
){

    if(
        routeSteps.length === 0
    ){
        return;
    }

    const step =
        routeSteps[
            currentStepIndex
        ];

    const remain =

        document
    .getElementById(
        "debugInfo"
    )
    .innerHTML +=

    `<br>
    REMAIN :
    ${remain}
    `;
        getRemainingDistanceToStep(
            lat,
            lng,
            step
        );

    const arrow =
        maneuverToArrow(
            step
            .navigationInstruction
            ?.maneuver
        );

    document
        .getElementById(
            "oledArrow"
        )
        .innerHTML =
        `${arrow}${remain}m`;

    if(remain < 15){

        currentStepIndex++;

        if(
            currentStepIndex >=
            routeSteps.length
        ){

            document
            .getElementById(
                "oledArrow"
            )
            .innerHTML =
            "GOAL";
        }
    }
}

function maneuverToArrow(m){

    switch(m){

        case "TURN_LEFT":
            return "←";

        case "TURN_RIGHT":
            return "→";

        case "TURN_SLIGHT_LEFT":
            return "↖";

        case "TURN_SLIGHT_RIGHT":
            return "↗";

        case "U_TURN_LEFT":
        case "U_TURN_RIGHT":
            return "↺";

        case "STRAIGHT":
        default:
            return "↑";
    }
}

function updateOLED(step){

    const maneuver =
        step.navigationInstruction?.maneuver ?? "";

    const arrow =
        maneuverToArrow(maneuver);

    const distance =
        step.distanceMeters ?? 0;

    document.getElementById(
        "oledArrow"
    ).innerHTML =
        `${arrow}${distance}m`;
}

function updateSpeed(speedMps){

    let speed = 0;

    if(speedMps !== null){

        speed =
            Math.round(
                speedMps * 3.6
            );
    }

    document.getElementById(
        "oledSpeed"
    ).innerHTML =
        `${speed}km/h`;
}

function buildRouteList(steps){

    let html = "";

    steps.forEach((step,index)=>{

        const maneuver =
            step.navigationInstruction?.maneuver
            ?? "STRAIGHT";

        const arrow =
            maneuverToArrow(maneuver);

        const distance =
            step.distanceMeters ?? 0;

        const instruction =
            step.navigationInstruction?.instructions
            ?? "";

        html += `
        <div class="route-step">
        <b>${index+1}</b>
        ${arrow}${distance}m
        <br>
        <small>${instruction}</small>
        </div>
        `;
    });

    return html;
}

async function getCurrentLocation(){

    return new Promise((resolve,reject)=>{

        navigator.geolocation.getCurrentPosition(

            pos=>{

                resolve({
                    lat:pos.coords.latitude,
                    lng:pos.coords.longitude
                });

            },

            reject,

            {
                enableHighAccuracy:true
            }
        );

    });
}

async function getRoute(
    startLat,
    startLng,
    endLat,
    endLng
){

    const response =
        await fetch(
        "https://routes.googleapis.com/directions/v2:computeRoutes",
        {

            method:"POST",

            headers:{

                "Content-Type":"application/json",

                "X-Goog-Api-Key":API_KEY,

                "X-Goog-FieldMask":
                "routes.distanceMeters,routes.duration,routes.legs.steps.polyline.encodedPolyline,routes.legs.steps.navigationInstruction,routes.legs.steps.distanceMeters"
            },

            body:JSON.stringify({

                origin:{
                    location:{
                        latLng:{
                            latitude:startLat,
                            longitude:startLng
                        }
                    }
                },

                destination:{
                    location:{
                        latLng:{
                            latitude:endLat,
                            longitude:endLng
                        }
                    }
                },

                travelMode:"DRIVE"

            })

        });

    return await response.json();
}

function calculateDistance(
    lat1,
    lon1,
    lat2,
    lon2
){

    const R = 6371000;

    const dLat =
        (lat2-lat1) *
        Math.PI/180;

    const dLon =
        (lon2-lon1) *
        Math.PI/180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)
        +
        Math.cos(lat1*Math.PI/180)
        *
        Math.cos(lat2*Math.PI/180)
        *
        Math.sin(dLon/2)
        *
        Math.sin(dLon/2);

    const c =
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R*c;
}

function checkRouteDeviation(
    lat,
    lng
){

    if(!currentRoute)
        return;

    const encoded =
        currentRoute.polyline
        ?.encodedPolyline;

    if(!encoded)
        return;

    const points =
        polyline.decode(encoded);

    let minDistance =
        Number.MAX_VALUE;

    for(const p of points){

        const dist =
            calculateDistance(
                lat,
                lng,
                p[0],
                p[1]
            );

        if(dist < minDistance){

            minDistance =
                dist;
        }
    }

    console.log(
        "Route Distance:",
        Math.round(minDistance)
    );

    if(
        minDistance >
        REROUTE_THRESHOLD
    ){

        console.log(
            "REROUTE"
        );

        reroute(
            lat,
            lng
        );
    }
}

async function reroute(
    currentLat,
    currentLng
){

    if(!destination)
        return;

    try{

        const route =
            await getRoute(

                currentLat,
                currentLng,

                destination.lat,
                destination.lng
            );

        currentRoute =
            route.routes[0];

        const steps =
            currentRoute.legs[0].steps;
            routeSteps =
            steps;

            currentStepIndex = 0;
        console.log(
    "STEP0 POLYLINE",
    decodePolyline(
        routeSteps[0]
        .polyline
        .encodedPolyline
    )
);
        document.getElementById(
            "routeList"
        ).innerHTML =
            buildRouteList(steps);

        updateOLED(
            steps[0]
        );

        console.log(
            "Route Updated"
        );

    }
    catch(err){

        console.error(err);

    }
}

function startLocationTracking(){

    if(watchId){

        navigator
        .geolocation
        .clearWatch(watchId);

    }

    watchId =
        navigator
        .geolocation
        .watchPosition(


pos => {

    const lat =
        pos.coords.latitude;

    const lng =
        pos.coords.longitude;

    const speed =
        pos.coords.speed;

    document
        .getElementById(
            "debugInfo"
        )
        .innerHTML =

        `
        LAT : ${lat}<br>
        LNG : ${lng}<br>
        SPEED : ${speed}<br>
        STEP : ${currentStepIndex}
        `;

    updateCurrentStep(
        lat,
        lng
    );

},
        err=>{

            console.error(err);

        },

        {

            enableHighAccuracy:true,

            maximumAge:3000,

            timeout:5000

        });

}

async function searchPlace(){

    const keyword =
        document
        .getElementById(
            "dest"
        ).value;

    if(!keyword){

        alert(
            "目的地を入力してください"
        );

        return;
    }

    try{

        const response =
            await fetch(

            "https://places.googleapis.com/v1/places:searchText",

            {

                method:"POST",

                headers:{

                    "Content-Type":
                    "application/json",

                    "X-Goog-Api-Key":
                    API_KEY,

                    "X-Goog-FieldMask":
                    "places.displayName,places.formattedAddress,places.location"
                },

                body:JSON.stringify({

                    textQuery:keyword

                })

            });

        const data =
            await response.json();

        const place =
            data.places[0];

        destination = {

            lat:
            place.location.latitude,

            lng:
            place.location.longitude

        };

        const current =
            await getCurrentLocation();

        const route =
            await getRoute(

                current.lat,
                current.lng,

                destination.lat,
                destination.lng

            );

console.log(
  JSON.stringify(
    route.routes[0],
    null,
    2
  )
);
            

currentRoute =
    route.routes[0];


        currentRoute =
            route.routes[0];

        const distanceKm =
            (
                currentRoute.distanceMeters
                /1000
            ).toFixed(1);

        const durationMin =
            Math.round(
                parseInt(
                    currentRoute.duration
                )/60
            );

        const steps =
            currentRoute
            .legs[0]
            .steps;
           routeSteps = steps;
        currentStepIndex = 0;

console.log(
    "DECODE TEST",
    decodePolyline(
        routeSteps[0]
        .polyline
        .encodedPolyline
    )
);

        
  

        document
            .getElementById(
                "routeList"
            )
            .innerHTML =
            buildRouteList(
                steps
            );

        updateOLED(
            steps[0]
        );

        document
            .getElementById(
                "result"
            )
            .innerHTML =

            `
            <b>目的地</b><br>
            ${place.displayName.text}
            <br><br>

            <b>住所</b><br>
            ${place.formattedAddress}

            <b>総距離</b><br>
            ${distanceKm} km
            <br><br>

            ${steps.length}
            `;

        startLocationTracking();

    }
    catch(error){

        console.error(error);

        document
            .getElementById(
                "result"
            )
            .innerHTML =

            + error;

    }

   
}

</script>

</body>
