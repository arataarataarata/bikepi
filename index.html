<script>

const API_KEY = "AIzaSyDm_lAR3kd0a8VAaGdqigrMeCgYTyLVl5I";

const REROUTE_THRESHOLD = 50;
    
let routeSteps = [];
let currentStepIndex = 0;
let destination = null;
let watchId = null;
let currentRoute = null;
let previousLat = null;
let previousLng = null;
let previousTime = null;
let lastRemain = null;
let offRouteCounter = 0;
let map;
let routeLine;



function initMap(){

    map =
        new google.maps.Map(

            document.getElementById(
                "map"
            ),

            {
                zoom:15,

                center:{
                    lat:35.68,
                    lng:139.76
                }
            }
        );
}
function drawRoute(
    encodedPolyline
){

    const path =
        google.maps.geometry
        .encoding
        .decodePath(
            encodedPolyline
        );

    if(routeLine){

        routeLine.setMap(
            null
        );
    }

    routeLine =
        new google.maps.Polyline({

            path:path,

            strokeColor:"#0000FF",

            strokeOpacity:1,

            strokeWeight:5

        });

    routeLine.setMap(
        map
    );

    const bounds =
        new google.maps.LatLngBounds();

    path.forEach(

        p => bounds.extend(p)

    );

    map.fitBounds(
        bounds
    );
}
    
function calculateSpeed(
    lat,
    lng
){

    const now =
        Date.now();

    if(
        previousLat === null
    ){

        previousLat = lat;
        previousLng = lng;
        previousTime = now;

        return 0;
    }

    const distance =

        calculateDistance(
            previousLat,
            previousLng,
            lat,
            lng
        );

    const seconds =

        (now - previousTime)
        / 1000;

    previousLat = lat;
    previousLng = lng;
    previousTime = now;

    if(seconds <= 0){

        return 0;
    }

    return Math.round(
        distance /
        seconds *
        3.6
    );
}

function getDistanceToStepEnd(
    lat,
    lng,
    step
){

    const points =
        decodePolyline(
            step.polyline
            .encodedPolyline
        );

    if(
        points.length === 0
    ){
        return 9999;
    }

    const target =
        points[
            points.length - 1
        ];

    return Math.round(

        calculateDistance(
            lat,
            lng,
            target[0],
            target[1]
        )

    );
}  
    
function decodePolyline(encoded) {

    let points = [];

    let index = 0;
    let lat = 0;
    let lng = 0;

    while (index < encoded.length) {

        let b;
        let shift = 0;
        let result = 0;

        do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);

        let dlat =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lat += dlat;

        shift = 0;
        result = 0;

        do {
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);

        let dlng =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lng += dlng;

        points.push([
            lat / 1e5,
            lng / 1e5
        ]);
    }

    return points;
}

function calculateDistance(
    lat1,
    lng1,
    lat2,
    lng2
){

    const R = 6371000;

    const dLat =
        (lat2-lat1)
        * Math.PI / 180;

    const dLng =
        (lng2-lng1)
        * Math.PI / 180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180)

        *

        Math.cos(lat2*Math.PI/180)

        *

        Math.sin(dLng/2)

        *

        Math.sin(dLng/2);

    return R *
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );
}
function getRemainingDistanceToStep(
    lat,
    lng,
    step
){

    const encoded =
        step.polyline
        ?.encodedPolyline;

    if(!encoded){

        return step.distanceMeters;
    }

    const points =
        decodePolyline(
            encoded
        );

    let nearestIndex = 0;

    let minDistance =
        Number.MAX_VALUE;

    points.forEach(
        (point,index)=>{

            const d =
                calculateDistance(
                    lat,
                    lng,

                    point[0],
                    point[1]
                );

            if(d < minDistance){

                minDistance = d;

                nearestIndex =
                    index;
            }

        }
    );

    let remain = 0;

    for(
        let i=nearestIndex;
        i<points.length-1;
        i++
    ){

        remain +=
            calculateDistance(

                points[i][0],
                points[i][1],

                points[i+1][0],
                points[i+1][1]
            );

    }

    return Math.round(
        remain
    );
}
function updateCurrentStep(
    lat,
    lng
){

    if(
        routeSteps.length === 0
    ){
        return;
    }

    const step =
        routeSteps[
            currentStepIndex
        ];

    const remain =
        getDistanceToStepEnd(
            lat,
            lng,
            step
        );

    // ------------------------
    // ルート逸脱判定
    // ------------------------

    if(
        lastRemain !== null
    ){

        if(
            remain >
            lastRemain + 10
        ){

            offRouteCounter++;

        }
        else{

            offRouteCounter = 0;

        }

        if(
            offRouteCounter >= 3
        ){

            recalculateRoute(
                lat,
                lng
            );

            offRouteCounter = 0;

            return;
        }
    }

    lastRemain = remain;

    // ------------------------
    // デバッグ表示
    // ------------------------

    document
    .getElementById(
        "debugInfo"
    )
    .innerHTML =

    `
    LAT : ${lat}<br>
    LNG : ${lng}<br>

    STEP : ${currentStepIndex}<br>

    REMAIN : ${remain}<br>

    OFFROUTE : ${offRouteCounter}<br>
    `;

    // ------------------------
    // 現在の矢印
    // ------------------------

    const arrow =
        maneuverToArrow(
            step
            .navigationInstruction
            ?.maneuver
        );

    // ------------------------
    // 次の矢印
    // ------------------------

    const nextStep =
        routeSteps[
            currentStepIndex + 1
        ];

    const nextArrow =
        nextStep
        ? maneuverToArrow(
            nextStep
            .navigationInstruction
            ?.maneuver
          )
        : "GOAL";
let remainText = "";

if(
    remain >= 1000
){

    remainText =
        (
            remain / 1000
        ).toFixed(1)
        + "km";

}
else{

    remainText =
        remain + "m";

}
    // ------------------------
    // OLED表示
    // ------------------------

    document
    .getElementById(
        "oledArrow"
    )
    .innerHTML =

    `
     ${remainText}m ${nextArrow}
    `;

    // ------------------------
    // STEP切替
    // ------------------------

    if(
        remain < 15
    ){

        currentStepIndex++;

        if(
            currentStepIndex >=
            routeSteps.length
        ){

            document
            .getElementById(
                "oledArrow"
            )
            .innerHTML =
            "GOAL";

            return;
        }
    }
}
function maneuverToArrow(m){

    switch(m){

        case "TURN_LEFT":
            return "←";

        case "TURN_RIGHT":
            return "→";

        case "TURN_SLIGHT_LEFT":
            return "↖";

        case "TURN_SLIGHT_RIGHT":
            return "↗";

        case "U_TURN_LEFT":
        case "U_TURN_RIGHT":
            return "↺";

        case "STRAIGHT":
        default:
            return "↑";
    }
}

function updateOLED(step){

    const maneuver =
        step.navigationInstruction?.maneuver ?? "";

    const arrow =
        maneuverToArrow(maneuver);

    const distance =
        step.distanceMeters ?? 0;

    document.getElementById(
        "oledArrow"
    ).innerHTML =
        `${arrow}${distance}m`;
}
    
function updateSpeed(speedKmh){

    console.log(
        "updateSpeed:",
        speedKmh
    );

    const oled =
        document.getElementById(
            "oledSpeed"
        );

    if(!oled){

        alert(
            "oledSpeed not found"
        );

        return;
    }

    oled.innerHTML =
        `${speedKmh}km/h`;
}


function buildRouteList(steps){

    let html = "";

    steps.forEach((step,index)=>{

        const maneuver =
            step.navigationInstruction?.maneuver
            ?? "STRAIGHT";

        const arrow =
            maneuverToArrow(maneuver);

        const distance =
            step.distanceMeters ?? 0;

        const instruction =
            step.navigationInstruction?.instructions
            ?? "";

        html += `
        <div class="route-step">
        <b>${index+1}</b>
        ${arrow}${distance}m
        <br>
        <small>${instruction}</small>
        </div>
        `;
    });

    return html;
}

async function getCurrentLocation(){

    return new Promise((resolve,reject)=>{

        navigator.geolocation.getCurrentPosition(

            pos=>{

                resolve({
                    lat:pos.coords.latitude,
                    lng:pos.coords.longitude
                });

            },

            reject,

            {
                enableHighAccuracy:true
            }
        );

    });
}

async function getRoute(
    startLat,
    startLng,
    endLat,
    endLng
){

    const response =
        await fetch(
        "https://routes.googleapis.com/directions/v2:computeRoutes",
        {

            method:"POST",

            headers:{

                "Content-Type":"application/json",

                "X-Goog-Api-Key":API_KEY,
"X-Goog-FieldMask":
"routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline,routes.legs.steps.polyline.encodedPolyline,routes.legs.steps.navigationInstruction,routes.legs.steps.distanceMeters"
             },
        body:JSON.stringify({
            origin:{
                location:{
                    latLng:{
                        latitude:startLat,
                        longitude:startLng
                    }
                }
            },
            destination:{
                location:{
                    latLng:{
                        latitude:endLat,
                        longitude:endLng
                    }
                }
            },

            travelMode:"DRIVE",

            routeModifiers:{
                avoidTolls:
                    !document
                        .getElementById(
                            "useToll"
                        )
                        .checked
            }
})
    

        });

    return await response.json();
}

function calculateDistance(
    lat1,
    lon1,
    lat2,
    lon2
){

    const R = 6371000;

    const dLat =
        (lat2-lat1) *
        Math.PI/180;

    const dLon =
        (lon2-lon1) *
        Math.PI/180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)
        +
        Math.cos(lat1*Math.PI/180)
        *
        Math.cos(lat2*Math.PI/180)
        *
        Math.sin(dLon/2)
        *
        Math.sin(dLon/2);

    const c =
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R*c;
}

function checkRouteDeviation(
    lat,
    lng
){

    if(!currentRoute)
        return;

    const encoded =
        currentRoute.polyline
        ?.encodedPolyline;

    if(!encoded)
        return;

    const points =
        polyline.decode(encoded);

    let minDistance =
        Number.MAX_VALUE;

    for(const p of points){

        const dist =
            calculateDistance(
                lat,
                lng,
                p[0],
                p[1]
            );

        if(dist < minDistance){

            minDistance =
                dist;
        }
    }

    console.log(
        "Route Distance:",
        Math.round(minDistance)
    );

    if(
        minDistance >
        REROUTE_THRESHOLD
    ){

        console.log(
            "REROUTE"
        );

        reroute(
            lat,
            lng
        );
    }
}

async function reroute(
    currentLat,
    currentLng
){

    if(!destination)
        return;

    try{

        const route =
            await getRoute(

                currentLat,
                currentLng,

                destination.lat,
                destination.lng
            );

        currentRoute =
            route.routes[0];

        const steps =
            currentRoute.legs[0].steps;
            routeSteps =
            steps;

            currentStepIndex = 0;
        console.log(
    "STEP0 POLYLINE",
    decodePolyline(
        routeSteps[0]
        .polyline
        .encodedPolyline
    )
);
        document.getElementById(
            "routeList"
        ).innerHTML =
            buildRouteList(steps);

        updateOLED(
            steps[0]
        );

        console.log(
            "Route Updated"
        );

    }
    catch(err){

        console.error(err);

    }
}

function startLocationTracking(){

    if(watchId){

        navigator
        .geolocation
        .clearWatch(watchId);

    }

    watchId =
        navigator
        .geolocation
        .watchPosition(


pos => {

    const lat =
        pos.coords.latitude;

    const lng =
        pos.coords.longitude;


    const speed =

    calculateSpeed(
        lat,
        lng
    );
    document
        .getElementById(
            "debugInfo"
        )
        .innerHTML =

        `
        LAT : ${lat}<br>
        LNG : ${lng}<br>
        SPEED : ${speed}<br>
        STEP : ${currentStepIndex}
        `;
    updateSpeed(speed);
    updateCurrentStep(
        lat,
        lng
    );

},
        err=>{

            console.error(err);

        },

        {

            enableHighAccuracy:true,

            maximumAge:3000,

            timeout:5000

        });

}
async function recalculateRoute(
    currentLat,
    currentLng
){

    if(!destination){
        return;
    }

    try{

        const route =
            await getRoute(

                currentLat,
                currentLng,

                destination.lat,
                destination.lng

            );

        routeSteps =
            route.routes[0]
            .legs[0]
            .steps;

        currentStepIndex = 0;

        updateOLED(
            routeSteps[0]
        );

        document
        .getElementById(
            "result"
        )
        .innerHTML +=

        "<br><b>ルート再検索実行</b>";

    }
    catch(error){

        console.error(
            error
        );

    }
}

currentRoute =

</script>
