<body>

</div>

<script>
/* =========================================================
   1. 基本設定
========================================================= */

const API_KEY = "AIzaSyDm_lAR3kd0a8VAaGdqigrMeCgYTyLVl5I";

const SERVICE_UUID =
    "12345678-1234-1234-1234-1234567890ab";

const CHARACTERISTIC_UUID =
    "abcd1234-1234-1234-1234-abcdef123456";

const HOME_ADDRESS =
    "東京都江戸川区清新町１丁目３";

const STEP_CHANGE_DISTANCE_M = 15;

const SEND_INTERVAL_MS = 1000;

const OFF_ROUTE_DISTANCE_M = 60;
const OFF_ROUTE_COUNT_LIMIT = 3;
const REROUTE_COOLDOWN_MS = 15000;
const MIN_SPEED_FOR_REROUTE_KMH = 5;
const GUIDE_TEXT_DISTANCE_M = 150;

/* =========================================================
   2. 状態管理
========================================================= */

let destination = null;
let currentRoute = null;
let routeSteps = [];
let currentStepIndex = 0;

let watchId = null;

let previousLat = null;
let previousLng = null;
let previousTime = null;

let latestSpeed = 0;
let lastSendTime = 0;

let map = null;
let routeLine = null;
let currentMarker = null;

let bleCharacteristic = null;
let bleConnected = false;
let offRouteCount = 0;
let lastRouteDistance = null;
let lastRerouteTime = 0;
let latestLat = null;
let latestLng = null;
let displayTimer = null;
let latestAccuracy = null;
let routePoints = [];
    
/* =========================================================
   3. 初期化
========================================================= */

window.onload = function(){
    initMap();
};


/* =========================================================
   4. BLE処理
========================================================= */
async function connectBle(){

    if(!navigator.bluetooth){
        alert("このブラウザはWeb Bluetoothに対応していません。iPhone Safari/Chromeでは使用できません。");
        document.getElementById("bleStatus").innerHTML =
            "Web Bluetooth非対応";
        return;
    }

    try{
        const device =
            await navigator.bluetooth.requestDevice({
                filters:[
                    { name:"BikeNaviESP32" }
                ],
                optionalServices:[
                    SERVICE_UUID
                ]
            });

        const server =
            await device.gatt.connect();

        const service =
            await server.getPrimaryService(
                SERVICE_UUID
            );

        bleCharacteristic =
            await service.getCharacteristic(
                CHARACTERISTIC_UUID
            );

        bleConnected = true;

        document.getElementById("bleStatus").innerHTML =
            "BLE接続済み";

        await sendToEsp32Text("BLE OK,READY");

    }
    catch(error){
        console.error(error);
        document.getElementById("bleStatus").innerHTML =
            "BLE接続失敗";
    }
}


async function sendToEsp32Text(text){

    if(!bleConnected || !bleCharacteristic){
        return;
    }

    const now = Date.now();

    if(now - lastSendTime < SEND_INTERVAL_MS){
        return;
    }

    lastSendTime = now;

    try{
        const encoder = new TextEncoder();

        await bleCharacteristic.writeValue(
            encoder.encode(text)
        );
    }
    catch(error){
        console.error("BLE send error:", error);
        bleConnected = false;

        document.getElementById("bleStatus").innerHTML =
            "BLE送信エラー";
    }
}


/* =========================================================
   5. Google Map
========================================================= */

function initMap(){

    map =
        new google.maps.Map(
            document.getElementById("map"),
            {
                zoom:15,
                center:{
                    lat:35.68,
                    lng:139.76
                }
            }
        );
    const trafficLayer =
        new google.maps.TrafficLayer();

        trafficLayer.setMap(map);
}

function drawRoute(encodedPolyline){

    const path =
        google.maps.geometry.encoding.decodePath(
            encodedPolyline
        );

    if(routeLine){
        routeLine.setMap(null);
    }

    routeLine =
        new google.maps.Polyline({
            path:path,
            strokeColor:"#0000FF",
            strokeOpacity:1,
            strokeWeight:5
        });

    routeLine.setMap(map);

    const bounds =
        new google.maps.LatLngBounds();

    path.forEach(p => bounds.extend(p));

    map.fitBounds(bounds);
}

function updateCurrentMarker(lat,lng){

    if(!map){
        return;
    }

    const position = {
        lat:lat,
        lng:lng
    };

    if(!currentMarker){

        currentMarker =
            new google.maps.Marker({
                position:position,
                map:map,
                title:"現在地"
            });

    }
    else{
        currentMarker.setPosition(position);
    }
}


/* =========================================================
   6. 目的地検索・ルート取得
========================================================= */

async function searchPlace(){

    const keyword =
        document.getElementById("dest").value;

    if(!keyword){
        alert("目的地を入力してください");
        return;
    }

    try{

        const place =
            await searchDestination(keyword);

        destination = {
            lat:place.location.latitude,
            lng:place.location.longitude
        };

        const current =
            await getCurrentLocation();

        compareRoutes(current,destination);

const useToll =
    document.getElementById("useToll").checked;

const routeData =
    await getRoute(
        current.lat,
        current.lng,
        destination.lat,
        destination.lng,
        !useToll,
        !useToll
    );

        if(!routeData.routes || routeData.routes.length === 0){
            throw new Error("ルートが取得できませんでした");
        }

        currentRoute =
            routeData.routes[0];

        routeSteps =
            currentRoute.legs[0].steps;

        routePoints =
            decodePolyline(
            currentRoute.polyline.encodedPolyline
        );
        
        currentStepIndex = 0;

        drawRoute(
            currentRoute.polyline.encodedPolyline
        );

        document.getElementById("routeList").innerHTML =
            buildRouteList(routeSteps);

        const distanceKm =
            (currentRoute.distanceMeters / 1000).toFixed(1);

        const durationMin =
            Math.round(
                parseInt(currentRoute.duration) / 60
            );

        document.getElementById("result").innerHTML =
            `
            <b>目的地</b><br>
            ${place.displayName.text}
            <br><br>

            <b>住所</b><br>
            ${place.formattedAddress}
            <br><br>

            <b>総距離</b><br>
            ${distanceKm} km
            <br><br>

            <b>所要時間</b><br>
            ${durationMin} 分
            <br><br>

            <b>ステップ数</b><br>
            ${routeSteps.length}
            `;

        updateCurrentStep(
            current.lat,
            current.lng
        );

        startLocationTracking();

    }
    catch(error){

        console.error(error);

        document.getElementById("result").innerHTML =
            "エラー<br><br>" + error;
    }
}

async function searchDestination(keyword){

    const response =
        await fetch(
            "https://places.googleapis.com/v1/places:searchText",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "X-Goog-Api-Key":API_KEY,
                    "X-Goog-FieldMask":
                        "places.displayName,places.formattedAddress,places.location"
                },
                body:JSON.stringify({
                    textQuery:keyword
                })
            }
        );

    const data =
        await response.json();

    if(!data.places || data.places.length === 0){
        throw new Error("目的地が見つかりません");
    }

    return data.places[0];
}

async function getRoute(
    startLat,
    startLng,
    endLat,
    endLng,
    avoidTolls = false,
    avoidHighways = false
){

    const response =
        await fetch(
            "https://routes.googleapis.com/directions/v2:computeRoutes",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",
                    "X-Goog-Api-Key":API_KEY,
                    "X-Goog-FieldMask":
                        "routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline,routes.travelAdvisory.tollInfo,routes.legs.steps.polyline.encodedPolyline,routes.legs.steps.navigationInstruction,routes.legs.steps.distanceMeters"
                },

                body:JSON.stringify({
                    origin:{
                        location:{
                            latLng:{
                                latitude:startLat,
                                longitude:startLng
                            }
                        }
                    },

                    destination:{
                        location:{
                            latLng:{
                                latitude:endLat,
                                longitude:endLng
                            }
                        }
                    },
                    travelMode:"DRIVE",
                    routingPreference:"TRAFFIC_AWARE_OPTIMAL",
                    trafficModel:"BEST_GUESS",
                    routeModifiers:{
                        avoidTolls:avoidTolls,
                        avoidHighways:avoidHighways,
                        vehicleInfo:{
                            emissionType:"GASOLINE"
                        }
                    },

                    extraComputations:[
                        "TOLLS"
                    ]
                })
            }
        );

    return await response.json();
}

function goHome(){

    document.getElementById("dest").value =
        HOME_ADDRESS;

    searchPlace();
}


/* =========================================================
   7. GPS
========================================================= */

async function getCurrentLocation(){

    return new Promise((resolve,reject)=>{

        navigator.geolocation.getCurrentPosition(

            pos=>{
                resolve({
                    lat:pos.coords.latitude,
                    lng:pos.coords.longitude
                });
            },

            reject,

            {
                enableHighAccuracy:true,
                maximumAge:0,
                timeout:10000
            }
        );
    });
}

function startLocationTracking(){

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
    }

    if(displayTimer){
        clearInterval(displayTimer);
    }

    watchId =
        navigator.geolocation.watchPosition(

            pos=>{

                latestLat =
                    pos.coords.latitude;

                latestLng =
                    pos.coords.longitude;
                
                latestAccuracy =
                    Math.round(
                    pos.coords.accuracy
                    );
                latestSpeed =
                    calculateSpeed(
                        latestLat,
                        latestLng
                    );

                updateCurrentMarker(
                    latestLat,
                    latestLng
                );
            },

            err=>{
                console.error(err);
            },

            {
                enableHighAccuracy:true,
                maximumAge:1000,
                timeout:5000
            }
        );

    displayTimer =
        setInterval(()=>{

            if(
                latestLat !== null &&
                latestLng !== null
            ){
                updateCurrentStep(
                    latestLat,
                    latestLng
                );
            }

        },1000);
}
function calculateSpeed(lat,lng){

    const now = Date.now();

    if(previousLat === null){

        previousLat = lat;
        previousLng = lng;
        previousTime = now;

        return 0;
    }

    const distance =
        calculateDistance(
            previousLat,
            previousLng,
            lat,
            lng
        );

    const seconds =
        (now - previousTime) / 1000;

    previousLat = lat;
    previousLng = lng;
    previousTime = now;

    if(seconds <= 0){
        return 0;
    }

    return Math.round(
        distance / seconds * 3.6
    );
}


/* =========================================================
   8. ナビ進行処理
========================================================= */
function shortenInstruction(text){

    if(!text){
        return "";
    }

    return text
        .replace(/首都高速/g,"首高")
        .replace(/方面の標識に従う/g,"方面")
        .replace(/で左車線を使用して/g," 左車線")
        .replace(/で右車線を使用して/g," 右車線")
        .replace(/有料区間/g,"")
        .replace(/\s+/g," ")
        .trim()
        .substring(0,16);
}
function updateCurrentStep(lat,lng){

    if(routeSteps.length === 0){
        return;
    }

    if(currentStepIndex >= routeSteps.length){
        updateOledPreview("GOAL","0");
        sendToEsp32Text("GOAL,0");
        return;
    }

    const step =
        routeSteps[currentStepIndex];

    const remain =
        getRemainingDistanceToStep(
            lat,
            lng,
            step
        );

    const maneuver =
        step.navigationInstruction?.maneuver ?? "STRAIGHT";

    const arrow =
        maneuverToArrow(maneuver);

    const nextStep =
        routeSteps[currentStepIndex + 1];

    const nextArrow =
        nextStep
            ? maneuverToArrow(
                nextStep.navigationInstruction?.maneuver
              )
            : "GOAL";

    const line1 =
    `${arrow} ${formatDistance(remain)} ${nextArrow}`;

    let line2 =
        `${latestSpeed}km/h ACC:${latestAccuracy ?? "--"}m`;

    if(remain <= GUIDE_TEXT_DISTANCE_M){

        const instruction =
            step.navigationInstruction?.instructions ??
            step.navigationInstruction?.instruction ??
            "";

        const shortInstruction =
            shortenInstruction(instruction);

        if(shortInstruction){
            line2 =
                shortInstruction;
        }
    }
    

    updateOledPreview(line1,line2);

    const sendText =
        `${line1},${line2}`;

    sendToEsp32Text(sendText);

    const payload = {
        line1:line1,
        line2:line2,
        arrow:arrow,
        next_arrow:nextArrow,
        remain_m:remain,
        speed_kmh:latestSpeed,
        step_index:currentStepIndex,
        timestamp:Date.now()
    };

    document.getElementById("jsonOutput").textContent =
        JSON.stringify(payload,null,2);

    document.getElementById("debugInfo").innerHTML =
        `
        LAT : ${lat}<br>
        LNG : ${lng}<br>
        SPEED : ${latestSpeed} km/h<br>
        STEP : ${currentStepIndex + 1} / ${routeSteps.length}<br>
        REMAIN : ${remain} m<br>
        NEXT : ${nextArrow}
        `;

    checkRouteDeviation(lat,lng);

    if(remain < STEP_CHANGE_DISTANCE_M){

        currentStepIndex++;

        if(currentStepIndex >= routeSteps.length){

            updateOledPreview("GOAL","ARRIVED");
            sendToEsp32Text("GOAL,ARRIVED");

            return;
        }
    }
}
async function recalculateRoute(currentLat,currentLng){

    if(!destination){
        return;
    }

    try{

       const useToll =
    document.getElementById("useToll").checked;

    const routeData =
        await getRoute(
            currentLat,
            currentLng,
            destination.lat,
            destination.lng,
            !useToll,
            !useToll
        );

        if(!routeData.routes || routeData.routes.length === 0){
            return;
        }

        currentRoute =
            routeData.routes[0];

        routeSteps =
            currentRoute.legs[0].steps;

        routePoints =
            decodePolyline(
            currentRoute.polyline.encodedPolyline
        );
        currentStepIndex = 0;

        drawRoute(
            currentRoute.polyline.encodedPolyline
        );

        document.getElementById("routeList").innerHTML =
            buildRouteList(routeSteps);

        document.getElementById("result").innerHTML +=
            "<br><b>ルート再検索実行</b>";

    }
    catch(error){
        console.error(error);
    }

    offRouteCount = 0;
    lastRouteDistance = null;
    lastRerouteTime = Date.now();
}
function checkRouteDeviation(lat, lng){

    if(!currentRoute){
        return;
    }

    if(!routePoints || routePoints.length === 0){
        return;
    }

    const points =
        routePoints;

console.log(
    "ROUTE DIST",
    currentRoute.distanceMeters,
    "POINTS",
    points.length,
    "M_PER_POINT",
    Math.round(
        currentRoute.distanceMeters /
        points.length
    )
);

    if(points.length === 0){
        return;
    }
let minDistance =
    Number.MAX_VALUE;

let nearestIndex = 0;

points.forEach((point,index)=>{

    const d =
        calculateDistance(
            lat,
            lng,
            point[0],
            point[1]
        );

    if(d < minDistance){
        minDistance = d;
        nearestIndex = index;
    }
});
let correctedDistance =
    minDistance;

const accuracyThreshold =
    latestAccuracy !== null
        ? latestAccuracy
        : 0;

if(minDistance > accuracyThreshold){

    let segmentDistance =
        minDistance;

    if(nearestIndex > 0){

        const prev =
            points[nearestIndex - 1];

        const current =
            points[nearestIndex];

        segmentDistance =
            Math.min(
                segmentDistance,
                calculateDistanceToSegment(
                    lat,
                    lng,
                    prev[0],
                    prev[1],
                    current[0],
                    current[1]
                )
            );
    }

    if(nearestIndex < points.length - 1){

        const current =
            points[nearestIndex];

        const next =
            points[nearestIndex + 1];

        segmentDistance =
            Math.min(
                segmentDistance,
                calculateDistanceToSegment(
                    lat,
                    lng,
                    current[0],
                    current[1],
                    next[0],
                    next[1]
                )
            );
    }

    correctedDistance =
        segmentDistance;
}
    const now =
        Date.now();

    const isFarFromRoute =
        correctedDistance > OFF_ROUTE_DISTANCE_M;

    const isGettingWorse =
        lastRouteDistance !== null &&
        correctedDistance > lastRouteDistance + 10;

    const isMoving =
        latestSpeed >= MIN_SPEED_FOR_REROUTE_KMH;

    const cooldownPassed =
        now - lastRerouteTime > REROUTE_COOLDOWN_MS;

    if(
        isFarFromRoute &&
        isGettingWorse &&
        isMoving
    ){
        offRouteCount++;
    }
    else if(
        minDistance < OFF_ROUTE_DISTANCE_M * 0.6
    ){
        offRouteCount = 0;
    }
    lastRouteDistance = correctedDistance;
    
    document.getElementById("debugInfo").innerHTML +=
        `
    <br>ROUTE_DIST : ${Math.round(correctedDistance)}m
    <br>POINT_DIST : ${Math.round(minDistance)}m
    <br>OFF_COUNT : ${offRouteCount}        `;

    if(
        offRouteCount >= OFF_ROUTE_COUNT_LIMIT &&
        cooldownPassed
    ){

        offRouteCount = 0;
        lastRouteDistance = null;
        lastRerouteTime = now;

        updateOledPreview(
            "REROUTE",
            "SEARCHING"
        );

        sendToEsp32Text(
            "REROUTE,SEARCHING"
        );

        recalculateRoute(
            lat,
            lng
        );
    }
}


function getRemainingDistanceToStep(lat,lng,step){

    const encoded =
        step.polyline?.encodedPolyline;

    if(!encoded){
        return step.distanceMeters ?? 9999;
    }

    const points =
        decodePolyline(encoded);

    if(points.length === 0){
        return step.distanceMeters ?? 9999;
    }

    let nearestIndex = 0;
    let minDistance = Number.MAX_VALUE;

    points.forEach((point,index)=>{

        const d =
            calculateDistance(
                lat,
                lng,
                point[0],
                point[1]
            );

        if(d < minDistance){
            minDistance = d;
            nearestIndex = index;
        }
    });

    let routeRemain = 0;

    for(let i = nearestIndex; i < points.length - 1; i++){

        routeRemain +=
            calculateDistance(
                points[i][0],
                points[i][1],
                points[i+1][0],
                points[i+1][1]
            );
    }

    const endPoint =
        points[points.length - 1];

    const directRemain =
        calculateDistance(
            lat,
            lng,
            endPoint[0],
            endPoint[1]
        );

    return Math.round(
        Math.min(
            routeRemain,
            directRemain
        )
    );
}


/* =========================================================
   9. 表示処理
========================================================= */

function updateOledPreview(line1,line2){

    document.getElementById("oledArrow").innerHTML =
        line1;

    document.getElementById("oledSpeed").innerHTML =
        line2;

    const now =
        new Date();

    document.getElementById("oledTime").innerHTML =
        "update: " +
        now.toLocaleTimeString();

    document.getElementById("oledAccuracy").innerHTML =
        "ACC: " +
        (
            latestAccuracy !== null
            ? latestAccuracy + "m"
            : "--"
        );
}
function buildRouteList(steps){

    let html = "";

    steps.forEach((step,index)=>{

        const maneuver =
            step.navigationInstruction?.maneuver ?? "STRAIGHT";

        const arrow =
            maneuverToArrow(maneuver);

        const distance =
            step.distanceMeters ?? 0;

        const instruction =
            step.navigationInstruction?.instructions ??
            step.navigationInstruction?.instruction ??
            "";

        const shortInstruction =
            shortenInstruction(instruction);

        html +=
            `
            <div class="route-step">
                <b>${index + 1}</b>
                ${arrow} ${formatDistance(distance)}
                <br>
                <b>短縮:</b> ${shortInstruction}
                <br>
                <small><b>元:</b> ${instruction}</small>
            </div>
            `;
    });

    return html;
}
/* =========================================================
   10. 高速利用比較
========================================================= */

async function compareRoutes(current,destination){

    try{

        const tollRouteData =
            await getRoute(
                current.lat,
                current.lng,
                destination.lat,
                destination.lng,
                false,
                false
            );

        const noTollRouteData =
            await getRoute(
                current.lat,
                current.lng,
                destination.lat,
                destination.lng,
                true,
                true
            );

        const tollRoute =
            tollRouteData.routes?.[0];

        const noTollRoute =
            noTollRouteData.routes?.[0];

        if(!tollRoute || !noTollRoute){
            return;
        }

        const tollDistance =
            (tollRoute.distanceMeters / 1000).toFixed(1);

        const noTollDistance =
            (noTollRoute.distanceMeters / 1000).toFixed(1);

        const tollDuration =
            formatDuration(tollRoute.duration);

        const noTollDuration =
            formatDuration(noTollRoute.duration);

        const tollPrice =
            getTollText(tollRoute);

        document.getElementById("routeCompare").innerHTML =
            `
            <table border="1" cellpadding="8" style="border-collapse:collapse;width:100%;">
                <tr>
                    <th></th>
                    <th>高速あり</th>
                    <th>高速なし</th>
                </tr>
                <tr>
                    <td>距離</td>
                    <td>${tollDistance} km</td>
                    <td>${noTollDistance} km</td>
                </tr>
                <tr>
                    <td>時間</td>
                    <td>${tollDuration}</td>
                    <td>${noTollDuration}</td>
                </tr>
                <tr>
                    <td>料金</td>
                    <td>${tollPrice}</td>
                    <td>0円</td>
                </tr>
            </table>
            `;
    }
    catch(error){
        console.error(error);
    }
}

function getTollText(route){

    const tollInfo =
        route?.travelAdvisory?.tollInfo;

    if(!tollInfo){
        return "0円";
    }

    const prices =
        tollInfo?.estimatedPrice;

    if(!prices || prices.length === 0){
        return "有料・料金不明";
    }

    const price = prices[0];

    const units =
        Number(price.units ?? 0);

    return units.toLocaleString() + "円";
}

function maneuverToArrow(m){

    switch(m){

        case "TURN_RIGHT":

function formatDistance(meters){

    if(meters >= 1000){
        return (meters / 1000).toFixed(1) + "km";
    }

    return meters + "m";
}

function formatDuration(durationText){

    const seconds =
        parseInt(durationText);

    const minutes =
        Math.round(seconds / 60);

    if(minutes >= 60){

        const h =
            Math.floor(minutes / 60);

        const m =
            minutes % 60;

        return `${h}時間${m}分`;
    }

    return `${minutes}分`;
}

function calculateDistance(lat1,lng1,lat2,lng2){

    const R = 6371000;

    const dLat =
        (lat2 - lat1) * Math.PI / 180;

    const dLng =
        (lng2 - lng1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) *
        Math.sin(dLat / 2)
        +
        Math.cos(lat1 * Math.PI / 180)
        *
        Math.cos(lat2 * Math.PI / 180)
        *
        Math.sin(dLng / 2)
        *
        Math.sin(dLng / 2);

    return R *
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1 - a)
        );
}
function calculateDistanceToSegment(lat,lng,lat1,lng1,lat2,lng2){

    const R = 6371000;

    const x =
        (lng - lng1) *
        Math.cos(
            ((lat1 + lat2) / 2) *
            Math.PI / 180
        ) *
        Math.PI / 180 *
        R;

    const y =
        (lat - lat1) *
        Math.PI / 180 *
        R;

    const x2 =
        (lng2 - lng1) *
        Math.cos(
            ((lat1 + lat2) / 2) *
            Math.PI / 180
        ) *
        Math.PI / 180 *
        R;

    const y2 =
        (lat2 - lat1) *
        Math.PI / 180 *
        R;

    const len2 =
        x2 * x2 + y2 * y2;

    if(len2 === 0){
        return calculateDistance(
            lat,
            lng,
            lat1,
            lng1
        );
    }

    let t =
        (x * x2 + y * y2) / len2;

    t =
        Math.max(
            0,
            Math.min(1,t)
        );

    const projX =
        t * x2;

    const projY =
        t * y2;

    const dx =
        x - projX;

    const dy =
        y - projY;

    return Math.sqrt(
        dx * dx + dy * dy
    );
}
function decodePolyline(encoded){

    let points = [];

    let index = 0;
    let lat = 0;
    let lng = 0;

    while(index < encoded.length){

        let b;
        let shift = 0;
        let result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }
        while(b >= 0x20);

        const dLat =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lat += dLat;

        shift = 0;
        result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }
        while(b >= 0x20);

        const dLng =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lng += dLng;

        points.push([
            lat / 1e5,
            lng / 1e5
        ]);
    }

    return points;
}
