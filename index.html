<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bike Navi Ver2.7</title>

<style>
body{
    font-family:sans-serif;
    margin:20px;
    max-width:900px;
}

input{
    width:320px;
    padding:8px;
}

button{
    padding:8px 16px;
    margin:4px;
}

.section{
    margin-top:20px;
    border:1px solid #ccc;
    padding:15px;
}

#oled{
    font-family:monospace;
    border:3px solid #000;
    padding:15px;
    width:260px;
    text-align:center;
    background:#eee;
}

#oledArrow{
    font-size:36px;
    font-family:monospace;
}

#oledSpeed{
    font-size:28px;
    margin-top:10px;
    font-family:monospace;
}

.route-step{
    margin-bottom:10px;
    padding:5px;
    border-bottom:1px solid #ddd;
}
</style>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDm_lAR3kd0a8VAaGdqigrMeCgYTyLVl5I&libraries=geometry"></script>
</head>

<body>

<h1>Bike Navi Ver2.7</h1>

<input type="text" id="dest" placeholder="目的地を入力">
<button onclick="searchPlace()">検索</button>
<button onclick="goHome()">自宅に戻る</button>

<br><br>

<button onclick="connectBle()">ESP32 BLE接続</button>
<span id="bleStatus">BLE未接続</span>

<br><br>

<label>
    <input type="checkbox" id="useToll" checked>
    有料道路を使用する
</label>

<div id="result" class="section">
待機中
</div>

<div class="section">
<h3>GPS / デバッグ情報</h3>
<div id="debugInfo">デバッグ待機中</div>
</div>

<div class="section">
<h3>OLED表示イメージ</h3>
<div id="oledArrow">Straight 0m</div>
<div id="oledSpeed">0km/h</div>
</div>

<div class="section">
<h3>高速利用 比較</h3>
<div id="routeCompare">未取得</div>
</div>

<div class="section">
<h3>ルート全体</h3>
<div id="routeList">未取得</div>
</div>

<div class="section">
<h3>ルートマップ</h3>
<div id="map" style="width:100%;height:500px;border:1px solid #ccc;"></div>
</div>

<div class="section">
<h3>ESP32送信用データ</h3>
<pre id="jsonOutput">未生成</pre>
</div>

<script>
/* =========================================================
   1. 基本設定
========================================================= */

const API_KEY = "AIzaSyDm_lAR3kd0a8VAaGdqigrMeCgYTyLVl5I";

const SERVICE_UUID =
    "12345678-1234-1234-1234-1234567890ab";

const CHARACTERISTIC_UUID =
    "abcd1234-1234-1234-1234-abcdef123456";

const HOME_ADDRESS =
    "東京都江戸川区清新町１丁目３";

const STEP_CHANGE_DISTANCE_M = 15;
const REROUTE_THRESHOLD_M = 50;
const SEND_INTERVAL_MS = 1000;


/* =========================================================
   2. 状態管理
========================================================= */

let destination = null;
let currentRoute = null;
let routeSteps = [];
let currentStepIndex = 0;

let watchId = null;

let previousLat = null;
let previousLng = null;
let previousTime = null;

let latestSpeed = 0;
let lastSendTime = 0;

let map = null;
let routeLine = null;
let currentMarker = null;

let bleCharacteristic = null;
let bleConnected = false;


/* =========================================================
   3. 初期化
========================================================= */

window.onload = function(){
    initMap();
};


/* =========================================================
   4. BLE処理
========================================================= */
async function connectBle(){

    if(!navigator.bluetooth){
        alert("このブラウザはWeb Bluetoothに対応していません。iPhone Safari/Chromeでは使用できません。");
        document.getElementById("bleStatus").innerHTML =
            "Web Bluetooth非対応";
        return;
    }

    try{
        const device =
            await navigator.bluetooth.requestDevice({
                filters:[
                    { name:"BikeNaviESP32" }
                ],
                optionalServices:[
                    SERVICE_UUID
                ]
            });

        const server =
            await device.gatt.connect();

        const service =
            await server.getPrimaryService(
                SERVICE_UUID
            );

        bleCharacteristic =
            await service.getCharacteristic(
                CHARACTERISTIC_UUID
            );

        bleConnected = true;

        document.getElementById("bleStatus").innerHTML =
            "BLE接続済み";

        await sendToEsp32Text("BLE OK,READY");

    }
    catch(error){
        console.error(error);
        document.getElementById("bleStatus").innerHTML =
            "BLE接続失敗";
    }
}


async function sendToEsp32Text(text){

    if(!bleConnected || !bleCharacteristic){
        return;
    }

    const now = Date.now();

    if(now - lastSendTime < SEND_INTERVAL_MS){
        return;
    }

    lastSendTime = now;

    try{
        const encoder = new TextEncoder();

        await bleCharacteristic.writeValue(
            encoder.encode(text)
        );
    }
    catch(error){
        console.error("BLE send error:", error);
        bleConnected = false;

        document.getElementById("bleStatus").innerHTML =
            "BLE送信エラー";
    }
}


/* =========================================================
   5. Google Map
========================================================= */

function initMap(){

    map =
        new google.maps.Map(
            document.getElementById("map"),
            {
                zoom:15,
                center:{
                    lat:35.68,
                    lng:139.76
                }
            }
        );
}

function drawRoute(encodedPolyline){

    const path =
        google.maps.geometry.encoding.decodePath(
            encodedPolyline
        );

    if(routeLine){
        routeLine.setMap(null);
    }

    routeLine =
        new google.maps.Polyline({
            path:path,
            strokeColor:"#0000FF",
            strokeOpacity:1,
            strokeWeight:5
        });

    routeLine.setMap(map);

    const bounds =
        new google.maps.LatLngBounds();

    path.forEach(p => bounds.extend(p));

    map.fitBounds(bounds);
}

function updateCurrentMarker(lat,lng){

    if(!map){
        return;
    }

    const position = {
        lat:lat,
        lng:lng
    };

    if(!currentMarker){

        currentMarker =
            new google.maps.Marker({
                position:position,
                map:map,
                title:"現在地"
            });

    }
    else{
        currentMarker.setPosition(position);
    }
}


/* =========================================================
   6. 目的地検索・ルート取得
========================================================= */

async function searchPlace(){

    const keyword =
        document.getElementById("dest").value;

    if(!keyword){
        alert("目的地を入力してください");
        return;
    }

    try{

        const place =
            await searchDestination(keyword);

        destination = {
            lat:place.location.latitude,
            lng:place.location.longitude
        };

        const current =
            await getCurrentLocation();

        compareRoutes(current,destination);

        const useToll =
            document.getElementById("useToll").checked;

        const routeData =
            await getRoute(
                current.lat,
                current.lng,
                destination.lat,
                destination.lng,
                !useToll,
                !useToll
            );

        if(!routeData.routes || routeData.routes.length === 0){
            throw new Error("ルートが取得できませんでした");
        }

        currentRoute =
            routeData.routes[0];

        routeSteps =
            currentRoute.legs[0].steps;

        currentStepIndex = 0;

        drawRoute(
            currentRoute.polyline.encodedPolyline
        );

        document.getElementById("routeList").innerHTML =
            buildRouteList(routeSteps);

        const distanceKm =
            (currentRoute.distanceMeters / 1000).toFixed(1);

        const durationMin =
            Math.round(
                parseInt(currentRoute.duration) / 60
            );

        document.getElementById("result").innerHTML =
            `
            <b>目的地</b><br>
            ${place.displayName.text}
            <br><br>

            <b>住所</b><br>
            ${place.formattedAddress}
            <br><br>

            <b>総距離</b><br>
            ${distanceKm} km
            <br><br>

            <b>所要時間</b><br>
            ${durationMin} 分
            <br><br>

            <b>ステップ数</b><br>
            ${routeSteps.length}
            `;

        updateCurrentStep(
            current.lat,
            current.lng
        );

        startLocationTracking();

    }
    catch(error){

        console.error(error);

        document.getElementById("result").innerHTML =
            "エラー<br><br>" + error;
    }
}

async function searchDestination(keyword){

    const response =
        await fetch(
            "https://places.googleapis.com/v1/places:searchText",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "X-Goog-Api-Key":API_KEY,
                    "X-Goog-FieldMask":
                        "places.displayName,places.formattedAddress,places.location"
                },
                body:JSON.stringify({
                    textQuery:keyword
                })
            }
        );

    const data =
        await response.json();

    if(!data.places || data.places.length === 0){
        throw new Error("目的地が見つかりません");
    }

    return data.places[0];
}

async function getRoute(
    startLat,
    startLng,
    endLat,
    endLng,
    avoidTolls = false,
    avoidHighways = false
){

    const response =
        await fetch(
            "https://routes.googleapis.com/directions/v2:computeRoutes",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",
                    "X-Goog-Api-Key":API_KEY,
                    "X-Goog-FieldMask":
                        "routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline,routes.travelAdvisory.tollInfo,routes.legs.steps.polyline.encodedPolyline,routes.legs.steps.navigationInstruction,routes.legs.steps.distanceMeters"
                },

                body:JSON.stringify({
                    origin:{
                        location:{
                            latLng:{
                                latitude:startLat,
                                longitude:startLng
                            }
                        }
                    },

                    destination:{
                        location:{
                            latLng:{
                                latitude:endLat,
                                longitude:endLng
                            }
                        }
                    },

                    travelMode:"DRIVE",

                    routeModifiers:{
                        avoidTolls:avoidTolls,
                        avoidHighways:avoidHighways,
                        vehicleInfo:{
                            emissionType:"GASOLINE"
                        }
                    },

                    extraComputations:[
                        "TOLLS"
                    ]
                })
            }
        );

    return await response.json();
}

function goHome(){

    document.getElementById("dest").value =
        HOME_ADDRESS;

    searchPlace();
}


/* =========================================================
   7. GPS
========================================================= */

async function getCurrentLocation(){

    return new Promise((resolve,reject)=>{

        navigator.geolocation.getCurrentPosition(

            pos=>{
                resolve({
                    lat:pos.coords.latitude,
                    lng:pos.coords.longitude
                });
            },

            reject,

            {
                enableHighAccuracy:true
            }
        );
    });
}

function startLocationTracking(){

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
    }

    watchId =
        navigator.geolocation.watchPosition(

            pos=>{

                const lat =
                    pos.coords.latitude;

                const lng =
                    pos.coords.longitude;

                latestSpeed =
                    calculateSpeed(lat,lng);

                updateSpeed(latestSpeed);

                updateCurrentMarker(lat,lng);

                updateCurrentStep(lat,lng);
            },

            err=>{
                console.error(err);
            },

            {
                enableHighAccuracy:true,
                maximumAge:3000,
                timeout:5000
            }
        );
}

function calculateSpeed(lat,lng){

    const now = Date.now();

    if(previousLat === null){

        previousLat = lat;
        previousLng = lng;
        previousTime = now;

        return 0;
    }

    const distance =
        calculateDistance(
            previousLat,
            previousLng,
            lat,
            lng
        );

    const seconds =
        (now - previousTime) / 1000;

    previousLat = lat;
    previousLng = lng;
    previousTime = now;

    if(seconds <= 0){
        return 0;
    }

    return Math.round(
        distance / seconds * 3.6
    );
}


/* =========================================================
   8. ナビ進行処理
========================================================= */

function updateCurrentStep(lat,lng){

    if(routeSteps.length === 0){
        return;
    }

    if(currentStepIndex >= routeSteps.length){
        updateOledPreview("GOAL","0km/h");
        sendToEsp32Text("GOAL,0km/h");
        return;
    }

    const step =
        routeSteps[currentStepIndex];

    const remain =
        getRemainingDistanceToStep(
            lat,
            lng,
            step
        );

    const maneuver =
        step.navigationInstruction?.maneuver ?? "STRAIGHT";

    const arrow =
        maneuverToArrow(maneuver);

    const nextStep =
        routeSteps[currentStepIndex + 1];

    const nextArrow =
        nextStep
            ? maneuverToArrow(
                nextStep.navigationInstruction?.maneuver
              )
            : "GOAL";

    const line1 =
        `${arrow} ${formatDistance(remain)}`;

    const line2 =
        `${latestSpeed}km/h`;

    updateOledPreview(line1,line2);

    const sendText =
        `${line1},${line2}`;

    sendToEsp32Text(sendText);

    const payload = {
        line1:line1,
        line2:line2,
        arrow:arrow,
        next_arrow:nextArrow,
        remain_m:remain,
        speed_kmh:latestSpeed,
        step_index:currentStepIndex,
        timestamp:Date.now()
    };

    document.getElementById("jsonOutput").textContent =
        JSON.stringify(payload,null,2);

    document.getElementById("debugInfo").innerHTML =
        `
        LAT : ${lat}<br>
        LNG : ${lng}<br>
        SPEED : ${latestSpeed} km/h<br>
        STEP : ${currentStepIndex + 1} / ${routeSteps.length}<br>
        REMAIN : ${remain} m<br>
        NEXT : ${nextArrow}
        `;

    checkRouteDeviation(lat,lng);

    if(remain < STEP_CHANGE_DISTANCE_M){

        currentStepIndex++;

        if(currentStepIndex >= routeSteps.length){

            updateOledPreview("GOAL","ARRIVED");
            sendToEsp32Text("GOAL,ARRIVED");

            return;
        }
    }
}

async function recalculateRoute(currentLat,currentLng){

    if(!destination){
        return;
    }

    try{

        const routeData =
            await getRoute(
                currentLat,
                currentLng,
                destination.lat,
                destination.lng
            );

        if(!routeData.routes || routeData.routes.length === 0){
            return;
        }

        currentRoute =
            routeData.routes[0];

        routeSteps =
            currentRoute.legs[0].steps;

        currentStepIndex = 0;

        drawRoute(
            currentRoute.polyline.encodedPolyline
        );

        document.getElementById("routeList").innerHTML =
            buildRouteList(routeSteps);

        document.getElementById("result").innerHTML +=
            "<br><b>ルート再検索実行</b>";

    }
    catch(error){
        console.error(error);
    }
}

function checkRouteDeviation(lat,lng){

    if(!currentRoute){
        return;
    }

    const encoded =
        currentRoute.polyline?.encodedPolyline;

    if(!encoded){
        return;
    }

    const points =
        decodePolyline(encoded);

    let minDistance =
        Number.MAX_VALUE;

    for(const point of points){

        const d =
            calculateDistance(
                lat,
                lng,
                point[0],
                point[1]
            );

        if(d < minDistance){
            minDistance = d;
        }
    }

    if(minDistance > REROUTE_THRESHOLD_M){

        document.getElementById("debugInfo").innerHTML +=
            `<br><b>REROUTE判定 : ${Math.round(minDistance)}m</b>`;

        recalculateRoute(lat,lng);
    }
}

function getRemainingDistanceToStep(lat,lng,step){

    const encoded =
        step.polyline?.encodedPolyline;

    if(!encoded){
        return step.distanceMeters ?? 9999;
    }

    const points =
        decodePolyline(encoded);

    if(points.length === 0){
        return step.distanceMeters ?? 9999;
    }

    let nearestIndex = 0;
    let minDistance = Number.MAX_VALUE;

    points.forEach((point,index)=>{

        const d =
            calculateDistance(
                lat,
                lng,
                point[0],
                point[1]
            );

        if(d < minDistance){
            minDistance = d;
            nearestIndex = index;
        }
    });

    let remain = 0;

    for(let i = nearestIndex; i < points.length - 1; i++){

        remain +=
            calculateDistance(
                points[i][0],
                points[i][1],
                points[i+1][0],
                points[i+1][1]
            );
    }

    return Math.round(remain);
}


/* =========================================================
   9. 表示処理
========================================================= */

function updateOledPreview(line1,line2){

    document.getElementById("oledArrow").innerHTML =
        line1;

    document.getElementById("oledSpeed").innerHTML =
        line2;
}

function updateSpeed(speedKmh){

    document.getElementById("oledSpeed").innerHTML =
        `${speedKmh}km/h`;
}

function buildRouteList(steps){

    let html = "";

    steps.forEach((step,index)=>{

        const maneuver =
            step.navigationInstruction?.maneuver ?? "STRAIGHT";

        const arrow =
            maneuverToArrow(maneuver);

        const distance =
            step.distanceMeters ?? 0;

        const instruction =
            step.navigationInstruction?.instructions ?? "";

        html +=
            `
            <div class="route-step">
                <b>${index + 1}</b>
                ${arrow} ${formatDistance(distance)}
                <br>
                <small>${instruction}</small>
            </div>
            `;
    });

    return html;
}


/* =========================================================
   10. 高速利用比較
========================================================= */

async function compareRoutes(current,destination){

    try{

        const tollRouteData =
            await getRoute(
                current.lat,
                current.lng,
                destination.lat,
                destination.lng,
                false,
                false
            );

        const noTollRouteData =
            await getRoute(
                current.lat,
                current.lng,
                destination.lat,
                destination.lng,
                true,
                true
            );

        const tollRoute =
            tollRouteData.routes?.[0];

        const noTollRoute =
            noTollRouteData.routes?.[0];

        if(!tollRoute || !noTollRoute){
            return;
        }

        const tollDistance =
            (tollRoute.distanceMeters / 1000).toFixed(1);

        const noTollDistance =
            (noTollRoute.distanceMeters / 1000).toFixed(1);

        const tollDuration =
            formatDuration(tollRoute.duration);

        const noTollDuration =
            formatDuration(noTollRoute.duration);

        const tollPrice =
            getTollText(tollRoute);

        document.getElementById("routeCompare").innerHTML =
            `
            <table border="1" cellpadding="8" style="border-collapse:collapse;width:100%;">
                <tr>
                    <th></th>
                    <th>高速あり</th>
                    <th>高速なし</th>
                </tr>
                <tr>
                    <td>距離</td>
                    <td>${tollDistance} km</td>
                    <td>${noTollDistance} km</td>
                </tr>
                <tr>
                    <td>時間</td>
                    <td>${tollDuration}</td>
                    <td>${noTollDuration}</td>
                </tr>
                <tr>
                    <td>料金</td>
                    <td>${tollPrice}</td>
                    <td>0円</td>
                </tr>
            </table>
            `;
    }
    catch(error){
        console.error(error);
    }
}

function getTollText(route){

    const tollInfo =
        route?.travelAdvisory?.tollInfo;

    if(!tollInfo){
        return "0円";
    }

    const prices =
        tollInfo?.estimatedPrice;

    if(!prices || prices.length === 0){
        return "有料・料金不明";
    }

    const price = prices[0];

    const units =
        Number(price.units ?? 0);

    return units.toLocaleString() + "円";
}


/* =========================================================
   11. 汎用関数
========================================================= */

function maneuverToArrow(m){

    switch(m){

        case "TURN_LEFT":
            return "Left";

        case "TURN_RIGHT":
            return "Right";

        case "TURN_SLIGHT_LEFT":
            return "Slight-L";

        case "TURN_SLIGHT_RIGHT":
            return "Slight-R";

        case "TURN_SHARP_LEFT":
            return "Sharp-L";

        case "TURN_SHARP_RIGHT":
            return "Sharp-R";

        case "U_TURN_LEFT":
        case "U_TURN_RIGHT":
            return "U-turn";

        case "STRAIGHT":
        default:
            return "Straight";
    }
}

function formatDistance(meters){

    if(meters >= 1000){
        return (meters / 1000).toFixed(1) + "km";
    }

    return meters + "m";
}

function formatDuration(durationText){

    const seconds =
        parseInt(durationText);

    const minutes =
        Math.round(seconds / 60);

    if(minutes >= 60){

        const h =
            Math.floor(minutes / 60);

        const m =
            minutes % 60;

        return `${h}時間${m}分`;
    }

    return `${minutes}分`;
}

function calculateDistance(lat1,lng1,lat2,lng2){

    const R = 6371000;

    const dLat =
        (lat2 - lat1) * Math.PI / 180;

    const dLng =
        (lng2 - lng1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) *
        Math.sin(dLat / 2)
        +
        Math.cos(lat1 * Math.PI / 180)
        *
        Math.cos(lat2 * Math.PI / 180)
        *
        Math.sin(dLng / 2)
        *
        Math.sin(dLng / 2);

    return R *
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1 - a)
        );
}

function decodePolyline(encoded){

    let points = [];

    let index = 0;
    let lat = 0;
    let lng = 0;

    while(index < encoded.length){

        let b;
        let shift = 0;
        let result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }
        while(b >= 0x20);

        const dLat =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lat += dLat;

        shift = 0;
        result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }
        while(b >= 0x20);

        const dLng =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lng += dLng;

        points.push([
            lat / 1e5,
            lng / 1e5
        ]);
    }

    return points;
}

</script>

</body>
</html>
