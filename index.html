<script>
/* =========================================================
   1. 基本設定
========================================================= */

const API_KEY = "AIzaSyDm_lAR3kd0a8VAaGdqigrMeCgYTyLVl5I";

const SERVICE_UUID =
    "12345678-1234-1234-1234-1234567890ab";

const CHARACTERISTIC_UUID =
    "abcd1234-1234-1234-1234-abcdef123456";

const HOME_ADDRESS =
    "東京都江戸川区清新町１丁目３";

const STEP_CHANGE_DISTANCE_M = 15;

const SEND_INTERVAL_MS = 1000;

const OFF_ROUTE_DISTANCE_M = 60;
const OFF_ROUTE_COUNT_LIMIT = 3;
const REROUTE_COOLDOWN_MS = 15000;
const MIN_SPEED_FOR_REROUTE_KMH = 5;
const GUIDE_TEXT_DISTANCE_M = 150;

const TEST_MODE = true;
const TEST_CURRENT_LOCATION = {
    lat:35.6640,
    lng:139.8590
};

/* =========================================================
   2. 状態管理
========================================================= */

let destination = null;
let currentRoute = null;
let routeSteps = [];
let currentStepIndex = 0;

let watchId = null;
let selectedUseToll = true;

let previousLat = null;
let previousLng = null;
let previousTime = null;

let latestSpeed = 0;
let lastSendTime = 0;

let map = null;
let routeLine = null;
let currentMarker = null;

let bleDevice = null;
let bleCharacteristic = null;
let bleConnected = false;
let offRouteCount = 0;
let lastRouteDistance = null;
let lastRerouteTime = 0;
let latestLat = null;
let latestLng = null;
let displayTimer = null;
let latestAccuracy = null;
let routePoints = [];

let tollRoute = null;
let noTollRoute = null;
let selectedRoute = null;
let navigationActive = false;


let headingHistory = [];
    
/* =========================================================
   3. 初期化
========================================================= */

window.onload = function(){
    initMap();
};
    
function endNavigation(){

    navigationActive = false;

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }

    if(displayTimer){
        clearInterval(displayTimer);
        displayTimer = null;
    }

    sendToEsp32Force("NAV_END,BIKE_MODE");

    updateOledPreview(
        "NAV END",
        "BIKE MODE"
    );
}

function searchWithToll(useToll){

    selectedUseToll = useToll;

    searchPlace();
}
function goHomeWithToll(useToll){

    selectedUseToll = useToll;

    document.getElementById("dest").value =
        HOME_ADDRESS;

    searchPlace();
}
    
/* =========================================================
   4. BLE処理
========================================================= */
async function connectBle(){

    if(!navigator.bluetooth){
        alert("このブラウザはWeb Bluetoothに対応していません。iPhone Safari/Chromeでは使用できません。");
        document.getElementById("bleStatus").innerHTML =
            "Web Bluetooth非対応";
        return;
    }

    try{
        bleDevice =
            await navigator.bluetooth.requestDevice({
                filters:[
                    { name:"BikeNaviESP32" }
                ],
                optionalServices:[
                    SERVICE_UUID
                ]
            });

        // 切断イベントを検知して状態を更新する
        bleDevice.addEventListener(
            "gattserverdisconnected",
            onBleDisconnected
        );

        const server =
            await bleDevice.gatt.connect();

        const service =
            await server.getPrimaryService(
                SERVICE_UUID
            );

        bleCharacteristic =
            await service.getCharacteristic(
                CHARACTERISTIC_UUID
            );

        bleConnected = true;

        document.getElementById("bleStatus").innerHTML =
            "BLE接続済み";

        await sendToEsp32Text("BLE OK,READY");

    }
    catch(error){
        console.error(error);
        document.getElementById("bleStatus").innerHTML =
            "BLE接続失敗";
    }
}
function disconnectBle(){

    endNavigation();

    if(bleDevice && bleDevice.gatt.connected){
        bleDevice.gatt.disconnect();
    }

    bleConnected = false;
    bleCharacteristic = null;

    document.getElementById("bleStatus").innerHTML =
        "BLE未接続";
}
function onBleDisconnected(){
    bleConnected = false;
    bleCharacteristic = null;
    document.getElementById("bleStatus").innerHTML =
        "BLE切断";
}


async function sendToEsp32Text(text){

    if(!bleConnected || !bleCharacteristic){
        return;
    }

    const now = Date.now();

    if(now - lastSendTime < SEND_INTERVAL_MS){
        return;
    }

    lastSendTime = now;

    try{
        const encoder = new TextEncoder();

        await bleCharacteristic.writeValue(
            encoder.encode(text)
        );
    }
    catch(error){
        console.error("BLE send error:", error);
        bleConnected = false;
        bleCharacteristic = null;

        document.getElementById("bleStatus").innerHTML =
            "BLE送信エラー";
    }
}

// レート制限をスキップして即時送信する（REROUTE等の重要メッセージ用）
async function sendToEsp32Force(text){

    if(!bleConnected || !bleCharacteristic){
        return;
    }

    lastSendTime = Date.now();

    try{
        const encoder = new TextEncoder();

        await bleCharacteristic.writeValue(
            encoder.encode(text)
        );
    }
    catch(error){
        console.error("BLE send error:", error);
        bleConnected = false;
        bleCharacteristic = null;

        document.getElementById("bleStatus").innerHTML =
            "BLE送信エラー";
    }
}


/* =========================================================
   5. Google Map
========================================================= */

function initMap(){

    map =
        new google.maps.Map(
            document.getElementById("map"),
            {
                zoom:15,
                center:{
                    lat:35.68,
                    lng:139.76
                }
            }
        );
    const trafficLayer =
        new google.maps.TrafficLayer();

        trafficLayer.setMap(map);
}

function drawRoute(encodedPolyline){

    const path =
        google.maps.geometry.encoding.decodePath(
            encodedPolyline
        );

    if(routeLine){
        routeLine.setMap(null);
    }

    routeLine =
        new google.maps.Polyline({
            path:path,
            strokeColor:"#0000FF",
            strokeOpacity:1,
            strokeWeight:5
        });

    routeLine.setMap(map);

    const bounds =
        new google.maps.LatLngBounds();

    path.forEach(p => bounds.extend(p));

    map.fitBounds(bounds);
}

function updateCurrentMarker(lat,lng){

    if(!map){
        return;
    }

    const position = {
        lat:lat,
        lng:lng
    };

    if(!currentMarker){

        currentMarker =
            new google.maps.Marker({
                position:position,
                map:map,
                title:"現在地"
            });

    }
    else{
        currentMarker.setPosition(position);
    }
}


/* =========================================================
   6. 目的地検索・ルート取得
========================================================= */

async function searchPlace(){

    const keyword =
        document.getElementById("dest").value;
    const routeLabel =
        selectedUseToll ? "高速あり" : "高速なし";

    const tollPrice =
        getTollText(currentRoute);
    
    if(!keyword){
        alert("目的地を入力してください");
        return;
    }

    try{

        const place =
            await searchDestination(keyword);

        destination = {
            lat:place.location.latitude,
            lng:place.location.longitude
        };

        const current =
            await getCurrentLocation();


        const useToll = selectedUseToll;
        const routeData =
            await getRoute(
                current.lat,
                current.lng,
                destination.lat,
                destination.lng,
                !useToll,
                !useToll
            );

        if(!routeData.routes || routeData.routes.length === 0){
            throw new Error("ルートが取得できませんでした");
        }

        currentRoute =
            routeData.routes[0];
    
        console.log(
            "TOLL INFO",
            currentRoute.travelAdvisory
        );

        routeSteps =
            currentRoute.legs[0].steps;

        routePoints =
            decodePolyline(
            currentRoute.polyline.encodedPolyline
        );

        currentStepIndex = 0;

        drawRoute(
            currentRoute.polyline.encodedPolyline
        );

        document.getElementById("routeList").innerHTML =
            buildRouteList(routeSteps);

        const distanceKm =
            (currentRoute.distanceMeters / 1000).toFixed(1);

        const durationMin =
            Math.round(
                parseInt(currentRoute.duration) / 60
            );

        document.getElementById("result").innerHTML =
            `
            <b>目的地</b><br>
            ${place.displayName.text}
            <br><br>

            <b>住所</b><br>
            ${place.formattedAddress}
            <br><br>

            <b>総距離</b><br>
            ${distanceKm} km
            <br><br>

            <b>所要時間</b><br>
            ${durationMin} 分
            <br><br>

            <b>料金</b><br>
            ${tollPrice}
            <br><br>

            <b>ステップ数</b><br>
            ${routeSteps.length}
            `;

        updateCurrentStep(
            current.lat,
            current.lng
        );

        startLocationTracking();

    }
    catch(error){

        console.error(error);

        document.getElementById("result").innerHTML =
            "エラー<br><br>" + error;
    }
}

async function searchDestination(keyword){

    const response =
        await fetch(
            "https://places.googleapis.com/v1/places:searchText",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "X-Goog-Api-Key":API_KEY,
                    "X-Goog-FieldMask":
                        "places.displayName,places.formattedAddress,places.location"
                },
                body:JSON.stringify({
                    textQuery:keyword
                })
            }
        );

    const data =
        await response.json();

    if(!data.places || data.places.length === 0){
        throw new Error("目的地が見つかりません");
    }

    return data.places[0];
}

async function getRoute(
    startLat,
    startLng,
    endLat,
    endLng,
    avoidTolls = false,
    avoidHighways = false
){

    const response =
        await fetch(
            "https://routes.googleapis.com/directions/v2:computeRoutes",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",
                    "X-Goog-Api-Key":API_KEY,
                    "X-Goog-FieldMask":
                        "routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline,routes.travelAdvisory.tollInfo,routes.legs.steps.polyline.encodedPolyline,routes.legs.steps.navigationInstruction,routes.legs.steps.distanceMeters"
                },

                body:JSON.stringify({
                    origin:{
                        location:{
                            latLng:{
                                latitude:startLat,
                                longitude:startLng
                            }
                        }
                    },

                    destination:{
                        location:{
                            latLng:{
                                latitude:endLat,
                                longitude:endLng
                            }
                        }
                    },
                    travelMode:"DRIVE",
                    routingPreference:"TRAFFIC_AWARE_OPTIMAL",
                    trafficModel:"BEST_GUESS",
                    routeModifiers:{
                        avoidTolls:avoidTolls,
                        avoidHighways:avoidHighways,
                        vehicleInfo:{
                            emissionType:"GASOLINE"
                        }
                    },

                    extraComputations:[
                        "TOLLS"
                    ]
                })
            }
        );

    return await response.json();
}

function goHome(){

    document.getElementById("dest").value =
        HOME_ADDRESS;

    searchPlace();
}


/* =========================================================
   7. GPS
========================================================= */

async function getCurrentLocation(){
    if(TEST_MODE){
        latestLat = TEST_CURRENT_LOCATION.lat;
        latestLng = TEST_CURRENT_LOCATION.lng;
        latestAccuracy = 10;

        return TEST_CURRENT_LOCATION;
    }

    return new Promise((resolve,reject)=>{
        // 既存GPS処理
    });
    
    return new Promise((resolve,reject)=>{

        navigator.geolocation.getCurrentPosition(

            pos=>{
                resolve({
                    lat:pos.coords.latitude,
                    lng:pos.coords.longitude
                });
            },

            reject,

            {
                enableHighAccuracy:true,
                maximumAge:0,
                timeout:10000
            }
        );
    });
}

function startLocationTracking(){

    if(watchId){
        navigator.geolocation.clearWatch(watchId);
    }

    if(displayTimer){
        clearInterval(displayTimer);
    }

    watchId =
        navigator.geolocation.watchPosition(

            pos=>{

                latestLat =
                    pos.coords.latitude;

                latestLng =
                    pos.coords.longitude;

                latestAccuracy =
                    Math.round(
                    pos.coords.accuracy
                    );
                latestSpeed =
                    calculateSpeed(
                        latestLat,
                        latestLng
                    );
                    updateHeadingFromTrack(
                        latestLat,
                        latestLng
                    );

                
                updateCurrentMarker(
                    latestLat,
                    latestLng
                );
            },

            err=>{
                console.error(err);
            },

            {
                enableHighAccuracy:true,
                maximumAge:1000,
                timeout:5000
            }
        );

    displayTimer =
        setInterval(()=>{

            if(
                latestLat !== null &&
                latestLng !== null
            ){
                updateCurrentStep(
                    latestLat,
                    latestLng
                );
            }

        },1000);
}

function calculateSpeed(lat,lng){

    const now = Date.now();

    if(previousLat === null){

        previousLat = lat;
        previousLng = lng;
        previousTime = now;

        return 0;
    }

    const distance =
        calculateDistance(
            previousLat,
            previousLng,
            lat,
            lng
        );

    const seconds =
        (now - previousTime) / 1000;

    previousLat = lat;
    previousLng = lng;
    previousTime = now;

    if(seconds <= 0){
        return 0;
    }

    return Math.round(
        distance / seconds * 3.6
    );
}


/* =========================================================
   8. ナビ進行処理
========================================================= */
function shortenInstruction(text){

    if(!text){
        return "";
    }

    return text
        .replace(/首都高速/g,"首高")
        .replace(/方面の標識に従う/g,"方面")
        .replace(/で左車線を使用して/g," 左車線")
        .replace(/で右車線を使用して/g," 右車線")
        .replace(/有料区間/g,"$")
        .replace(/斜め/g,"斜")
        .replace(/都心環状線/g,"環状")
        .replace(/中央環状線/g,"環状")
        .replace(/東北自動車道/g,"東北道")
        .replace(/\s+/g," ")
        .trim()
        .substring(0,16);
}

function updateCurrentStep(lat,lng){

    if(routeSteps.length === 0){
        return;
    }

    if(currentStepIndex >= routeSteps.length){
        updateOledPreview("GOAL","0");
        sendToEsp32Text("GOAL,0");
        return;
    }

    const step =
        routeSteps[currentStepIndex];

    const remain =
        getRemainingDistanceToStep(
            lat,
            lng,
            step
        );

    const maneuver =
        step.navigationInstruction?.maneuver ?? "STRAIGHT";

    const arrowId =
        maneuverToArrow(maneuver);

    const nextStep =
        routeSteps[currentStepIndex + 1];

    const nextArrowId =
        nextStep
            ? maneuverToArrow(
                nextStep.navigationInstruction?.maneuver ?? "STRAIGHT"
              )
            : 3;

    const distanceText =
        formatDistance(remain);

    let line2 =
        `${latestSpeed}km/h ACC:${latestAccuracy ?? "--"}m`;

    if(remain <= GUIDE_TEXT_DISTANCE_M){

        const guideStep =
            nextStep ?? step;

        const instruction =
            guideStep.navigationInstruction?.instructions ??
            guideStep.navigationInstruction?.instruction ??
            "";

        const shortInstruction =
            shortenInstruction(instruction);

        if(shortInstruction){
            line2 =
                shortInstruction;
        }
    }

    updateOledPreview(`${arrowId}|${distanceText}|${nextArrowId}`, line2);
    
    drawMiniPolylineMap(lat,lng);

        document.getElementById("oledRightLine1").innerHTML =
            `${distanceText}`;

        document.getElementById("oledRightLine2").innerHTML =
            `${arrowId} → ${nextArrowId}`;
    
    // Arduino側のパース: arrow1|distance|arrow2|maneuver|line2 の5フィールド形式
    const sendText =
    `${arrowId}|${distanceText}|${nextArrowId}|${maneuver}|${line2}`;

    sendToEsp32Text(sendText);

    const payload = {
        line1:`${arrowId}|${distanceText}|${nextArrowId}`,
        line2:line2,
        maneuver:maneuver,
        arrow_id:arrowId,
        next_arrow_id:nextArrowId,
        remain_m:remain,
        speed_kmh:latestSpeed,
        step_index:currentStepIndex,
        timestamp:Date.now()
    };

    document.getElementById("jsonOutput").textContent =
        JSON.stringify(payload,null,2);

    document.getElementById("debugInfo").innerHTML =
        `
        LAT : ${lat}<br>
        LNG : ${lng}<br>
        SPEED : ${latestSpeed} km/h<br>
        STEP : ${currentStepIndex + 1} / ${routeSteps.length}<br>
        REMAIN : ${remain} m<br>
        NEXT : ${nextArrowId}
        `;

    checkRouteDeviation(lat,lng);

    if(remain < STEP_CHANGE_DISTANCE_M){

        currentStepIndex++;

        if(currentStepIndex >= routeSteps.length){

            updateOledPreview("GOAL","ARRIVED");
            sendToEsp32Text("GOAL,ARRIVED");

            return;
        }
    }
}

async function recalculateRoute(currentLat,currentLng){

    if(!destination){
        return;
    }

    try{

        const useToll = selectedUseToll;
        const routeData =
            await getRoute(
                currentLat,
                currentLng,
                destination.lat,
                destination.lng,
                !useToll,
                !useToll
            );

        if(!routeData.routes || routeData.routes.length === 0){
            return;
        }

        currentRoute =
            routeData.routes[0];

        routeSteps =
            currentRoute.legs[0].steps;

        routePoints =
            decodePolyline(
            currentRoute.polyline.encodedPolyline
        );
        currentStepIndex = 0;

        drawRoute(
            currentRoute.polyline.encodedPolyline
        );

        document.getElementById("routeList").innerHTML =
            buildRouteList(routeSteps);

        document.getElementById("result").innerHTML +=
            "<br><b>ルート再検索実行</b>";

    }
    catch(error){
        console.error(error);
    }

    offRouteCount = 0;
    lastRouteDistance = null;
    lastRerouteTime = Date.now();
}

function checkRouteDeviation(lat, lng){

    if(!currentRoute){
        return;
    }

    if(!routePoints || routePoints.length === 0){
        return;
    }

    const points =
        routePoints;

    let minDistance =
        Number.MAX_VALUE;

    let nearestIndex = 0;

    points.forEach((point,index)=>{

        const d =
            calculateDistance(
                lat,
                lng,
                point[0],
                point[1]
            );

        if(d < minDistance){
            minDistance = d;
            nearestIndex = index;
        }
    });

    let correctedDistance =
        minDistance;

    const accuracyThreshold =
        latestAccuracy !== null
            ? latestAccuracy
            : 0;

    if(minDistance > accuracyThreshold){

        let segmentDistance =
            minDistance;

        if(nearestIndex > 0){

            const prev =
                points[nearestIndex - 1];

            const current =
                points[nearestIndex];

            segmentDistance =
                Math.min(
                    segmentDistance,
                    calculateDistanceToSegment(
                        lat,
                        lng,
                        prev[0],
                        prev[1],
                        current[0],
                        current[1]
                    )
                );
        }

        if(nearestIndex < points.length - 1){

            const current =
                points[nearestIndex];

            const next =
                points[nearestIndex + 1];

            segmentDistance =
                Math.min(
                    segmentDistance,
                    calculateDistanceToSegment(
                        lat,
                        lng,
                        current[0],
                        current[1],
                        next[0],
                        next[1]
                    )
                );
        }

        correctedDistance =
            segmentDistance;
    }

    const now =
        Date.now();

    const accuracyBuffer =
        latestAccuracy !== null
            ? latestAccuracy + 10
            : OFF_ROUTE_DISTANCE_M;

    const isMoving =
        latestSpeed >= MIN_SPEED_FOR_REROUTE_KMH;

    const cooldownPassed =
        now - lastRerouteTime > REROUTE_COOLDOWN_MS;

    if(
        correctedDistance > accuracyBuffer &&
        isMoving
    ){
        offRouteCount++;
    }
    else if(
        correctedDistance <= accuracyBuffer
    ){
        offRouteCount = 0;
    }

    lastRouteDistance = correctedDistance;

    document.getElementById("debugInfo").innerHTML +=
        `
    <br>ROUTE_DIST : ${Math.round(correctedDistance)}m
    <br>POINT_DIST : ${Math.round(minDistance)}m
    <br>OFF_COUNT : ${offRouteCount}
    <br>ROUTE_LIMIT : ${Math.round(accuracyBuffer)}m
    `;

    if(
        offRouteCount >= OFF_ROUTE_COUNT_LIMIT &&
        cooldownPassed
    ){

        offRouteCount = 0;
        lastRouteDistance = null;
        lastRerouteTime = now;

        updateOledPreview(
            "REROUTE",
            "SEARCHING"
        );

        // 重要メッセージのためレート制限をスキップして即時送信
        sendToEsp32Force(
            "REROUTE,SEARCHING"
        );

        recalculateRoute(
            lat,
            lng
        );
    }
}


function getRemainingDistanceToStep(lat,lng,step){

    const encoded =
        step.polyline?.encodedPolyline;

    if(!encoded){
        return step.distanceMeters ?? 9999;
    }

    const points =
        decodePolyline(encoded);

    if(points.length === 0){
        return step.distanceMeters ?? 9999;
    }

    let nearestIndex = 0;
    let minDistance = Number.MAX_VALUE;

    points.forEach((point,index)=>{

        const d =
            calculateDistance(
                lat,
                lng,
                point[0],
                point[1]
            );

        if(d < minDistance){
            minDistance = d;
            nearestIndex = index;
        }
    });

    let routeRemain = 0;

    for(let i = nearestIndex; i < points.length - 1; i++){

        routeRemain +=
            calculateDistance(
                points[i][0],
                points[i][1],
                points[i+1][0],
                points[i+1][1]
            );
    }

    const endPoint =
        points[points.length - 1];

    const directRemain =
        calculateDistance(
            lat,
            lng,
            endPoint[0],
            endPoint[1]
        );

    return Math.round(
        Math.min(
            routeRemain,
            directRemain
        )
    );
}


/* =========================================================
   8-A. ミニPolylineマップ 32x32 テスト表示
========================================================= */

const MINI_MAP_W = 320;
const MINI_MAP_H = 320;

// 暫定スケール：横1000m、縦2000m
const MINI_VIEW_W_M = 500;
const MINI_VIEW_H_M = 500;

// 現在地表示位置：下中央
const MINI_SELF_X = 160;
const MINI_SELF_Y = 280;

// 進行方向。GPSからheadingが取れない場合はルート方向で推定
let latestHeadingDeg = null;

function drawMiniPolylineMap(lat,lng){

    const canvas =
        document.getElementById("miniMapCanvas");

    if(!canvas){
        return;
    }

    const ctx =
        canvas.getContext("2d");

    ctx.clearRect(0,0,MINI_MAP_W,MINI_MAP_H);

    // 背景
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,MINI_MAP_W,MINI_MAP_H);

    if(!routePoints || routePoints.length < 2){
        drawMiniSelf(ctx);
        return;
    }

    const heading =
        getMiniMapHeading(lat,lng);

    // ルート線
    ctx.strokeStyle = "white";
    ctx.lineWidth = 10;
    ctx.beginPath();
   // ctx.moveTo(MINI_SELF_X, MINI_SELF_Y - 20);
   // ctx.lineTo(MINI_SELF_X, MINI_SELF_Y - 80);
   // ctx.stroke();

    let started = false;

    for(const point of routePoints){

        const pLat = point[0];
        const pLng = point[1];

        const local =
            latLngToLocalMeter(
                pLat,
                pLng,
                lat,
                lng
            );

        const rotated =
            rotateLocalByHeading(
                local.x,
                local.y,
                heading
            );

        const screen =
            localMeterToMiniScreen(
                rotated.x,
                rotated.y
            );

        if(!started){
            ctx.moveTo(screen.x,screen.y);
            started = true;
        }
        else{
            ctx.lineTo(screen.x,screen.y);
        }
    }

    ctx.stroke();

    // 現在地 ●
    drawMiniSelf(ctx);

    // 上方向ガイド線
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(MINI_SELF_X, MINI_SELF_Y - 4);
    ctx.lineTo(MINI_SELF_X, MINI_SELF_Y - 10);
    ctx.stroke();
}

function drawMiniSelf(ctx){

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(
        MINI_SELF_X,
        MINI_SELF_Y,
        10,
        0,
        Math.PI * 2
    );
    ctx.fill();
}

function getMiniMapHeading(lat,lng){

    // 走行履歴から算出した進行方向を最優先
    if(latestHeadingDeg !== null){
        return latestHeadingDeg;
    }

    // まだ走行履歴がない場合だけ、ルート方向で代用
    if(!routePoints || routePoints.length < 2){
        return 0;
    }

    let nearestIndex = 0;
    let minDistance = Number.MAX_VALUE;

    routePoints.forEach((point,index)=>{

        const d =
            calculateDistance(
                lat,
                lng,
                point[0],
                point[1]
            );

        if(d < minDistance){
            minDistance = d;
            nearestIndex = index;
        }
    });

    const nextIndex =
        Math.min(
            nearestIndex + 1,
            routePoints.length - 1
        );

    const current =
        routePoints[nearestIndex];

    const next =
        routePoints[nextIndex];

    return calculateBearing(
        current[0],
        current[1],
        next[0],
        next[1]
    );
}
function latLngToLocalMeter(lat,lng,originLat,originLng){

    const meterPerLat = 111320;

    const meterPerLng =
        111320 *
        Math.cos(originLat * Math.PI / 180);

    const x =
        (lng - originLng) * meterPerLng;

    const y =
        (lat - originLat) * meterPerLat;

    return {
        x:x,
        y:y
    };
}

function rotateLocalByHeading(x,y,headingDeg){

    // heading方向を画面上方向に合わせる
    const rad =
        -headingDeg * Math.PI / 180;

    const rx =
        x * Math.cos(rad) -
        y * Math.sin(rad);

    const ry =
        x * Math.sin(rad) +
        y * Math.cos(rad);

    return {
        x:rx,
        y:ry
    };
}

function localMeterToMiniScreen(x,y){

    const sx =
        MINI_SELF_X +
        (x / MINI_VIEW_W_M) *
        MINI_MAP_W;

    const sy =
        MINI_SELF_Y -
        (y / MINI_VIEW_H_M) *
        MINI_MAP_H;

    return {
        x:sx,
        y:sy
    };
}
function updateHeadingFromTrack(lat,lng){

    const now = Date.now();

    headingHistory.push({
        lat:lat,
        lng:lng,
        time:now
    });

    // 直近10点だけ保持
    if(headingHistory.length > 10){
        headingHistory.shift();
    }

    if(headingHistory.length < 2){
        return;
    }

    // 近すぎる点はGPSブレなので無視
    const latest =
        headingHistory[headingHistory.length - 1];

    let base = null;

    // 直近履歴の中から、現在地から5m以上離れた点を探す
    for(let i = headingHistory.length - 2; i >= 0; i--){

        const p =
            headingHistory[i];

        const d =
            calculateDistance(
                p.lat,
                p.lng,
                latest.lat,
                latest.lng
            );

        if(d >= 5){
            base = p;
            break;
        }
    }

    if(!base){
        return;
    }

    const newHeading =
        calculateBearing(
            base.lat,
            base.lng,
            latest.lat,
            latest.lng
        );

    // 初回
    if(latestHeadingDeg === null){
        latestHeadingDeg = newHeading;
        return;
    }

    // 急激な向き変化をなめらかにする
    latestHeadingDeg =
        smoothHeading(
            latestHeadingDeg,
            newHeading,
            0.35
        );
}
function smoothHeading(oldHeading,newHeading,alpha){

    let diff =
        ((newHeading - oldHeading + 540) % 360) - 180;

    return (
        oldHeading +
        diff * alpha +
        360
    ) % 360;
}
function calculateBearing(lat1,lng1,lat2,lng2){

    const φ1 =
        lat1 * Math.PI / 180;

    const φ2 =
        lat2 * Math.PI / 180;

    const Δλ =
        (lng2 - lng1) * Math.PI / 180;

    const y =
        Math.sin(Δλ) * Math.cos(φ2);

    const x =
        Math.cos(φ1) * Math.sin(φ2) -
        Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);

    const θ =
        Math.atan2(y,x);

    return (
        θ * 180 / Math.PI +
        360
    ) % 360;
}

/* =========================================================
   9. 表示処理
========================================================= */
function updateOledPreview(line1,line2){

    document.getElementById("oledArrow").innerHTML =
        line1;

    document.getElementById("oledSpeed").innerHTML =
        line2;

    const now =
        new Date();

    document.getElementById("oledTime").innerHTML =
        "update: " +
        now.toLocaleTimeString();

    document.getElementById("oledAccuracy").innerHTML =
        "ACC: " +
        (
            latestAccuracy !== null
            ? latestAccuracy + "m"
            : "--"
        );
}

function buildRouteList(steps){

    let html = "";

    steps.forEach((step,index)=>{

        const maneuver =
            step.navigationInstruction?.maneuver ?? "STRAIGHT";

        const arrow =
            maneuverToArrow(maneuver);

        const distance =
            step.distanceMeters ?? 0;

        const instruction =
            step.navigationInstruction?.instructions ??
            step.navigationInstruction?.instruction ??
            "";

        const shortInstruction =
            shortenInstruction(instruction);

        html +=
            `
    <div class="route-step">
        <b>${index + 1}</b>
        ${arrow} ${formatDistance(distance)}
        <br>
        <b>maneuver:</b> ${maneuver}
        <br>
        <b>短縮:</b> ${shortInstruction}
        <br>
        <small><b>元:</b> ${instruction}</small>
    </div>
    `;
    });

    return html;
}

/* =========================================================
   10. 高速利用比較
========================================================= */


function getTollText(route){

    const tollInfo =
        route?.travelAdvisory?.tollInfo;

    if(!tollInfo){
        return "0円";
    }

    const prices =
        tollInfo?.estimatedPrice;

    if(!prices || prices.length === 0){
        return "有料・料金不明";
    }

    const price = prices[0];

    const units =
        Number(price.units ?? 0);

    return units.toLocaleString() + "円";
}


/* =========================================================
   11. 汎用関数
========================================================= */

function maneuverToArrow(m){

    const map = {
        "TURN_LEFT":       1,
        "RAMP_LEFT":       1,
        "TURN_RIGHT":      2,
        "RAMP_RIGHT":      2,
        "STRAIGHT":        3,
        "NAME_CHANGE":    3,
        "TURN_SLIGHT_LEFT":  4,
        "TURN_SLIGHT_RIGHT": 5,
        "TURN_SHARP_LEFT":   6,
        "TURN_SHARP_RIGHT":  7,
        "UTURN_LEFT":      8,
        "UTURN_RIGHT":     9,
        "ROUNDABOUT_LEFT": 10,
        "ROUNDABOUT_RIGHT":11,
        "MERGE":           12,
        "FORK_LEFT":       13,
        "FORK_RIGHT":      14,
        "KEEP_LEFT":       15,
        "KEEP_RIGHT":      16,
        "DEPARTURE":        17,
        "DEPART":        17,
        "DESTINATION":        18
    };

    // // 未知のmaneuverは99として扱い、ESP32側でmaneuver文字列を表示する
    return map[m] || 99;
}


function formatDistance(meters){

    if(meters >= 1000){
        return (meters / 1000).toFixed(1) + "km";
    }

    return meters + "m";
}

function formatDuration(durationText){

    // Routes API v2はdurationを"1234s"形式で返す
    const seconds =
        parseFloat(durationText);

    const minutes =
        Math.round(seconds / 60);

    if(minutes >= 60){

        const h =
            Math.floor(minutes / 60);

        const m =
            minutes % 60;

        return `${h}時間${m}分`;
    }

    return `${minutes}分`;
}

function calculateDistance(lat1,lng1,lat2,lng2){

    const R = 6371000;

    const dLat =
        (lat2 - lat1) * Math.PI / 180;

    const dLng =
        (lng2 - lng1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) *
        Math.sin(dLat / 2)
        +
        Math.cos(lat1 * Math.PI / 180)
        *
        Math.cos(lat2 * Math.PI / 180)
        *
        Math.sin(dLng / 2)
        *
        Math.sin(dLng / 2);

    return R *
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1 - a)
        );
}

function calculateDistanceToSegment(lat,lng,lat1,lng1,lat2,lng2){

    const R = 6371000;

    const x =
        (lng - lng1) *
        Math.cos(
            ((lat1 + lat2) / 2) *
            Math.PI / 180
        ) *
        Math.PI / 180 *
        R;

    const y =
        (lat - lat1) *
        Math.PI / 180 *
        R;

    const x2 =
        (lng2 - lng1) *
        Math.cos(
            ((lat1 + lat2) / 2) *
            Math.PI / 180
        ) *
        Math.PI / 180 *
        R;

    const y2 =
        (lat2 - lat1) *
        Math.PI / 180 *
        R;

    const len2 =
        x2 * x2 + y2 * y2;

    if(len2 === 0){
        return calculateDistance(
            lat,
            lng,
            lat1,
            lng1
        );
    }

    let t =
        (x * x2 + y * y2) / len2;

    t =
        Math.max(
            0,
            Math.min(1,t)
        );

    const projX =
        t * x2;

    const projY =
        t * y2;

    const dx =
        x - projX;

    const dy =
        y - projY;

    return Math.sqrt(
        dx * dx + dy * dy
    );
}

function decodePolyline(encoded){

    let points = [];

    let index = 0;
    let lat = 0;
    let lng = 0;

    while(index < encoded.length){

        let b;
        let shift = 0;
        let result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }
        while(b >= 0x20);

        const dLat =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lat += dLat;

        shift = 0;
        result = 0;

        do{
            b = encoded.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        }
        while(b >= 0x20);

        const dLng =
            (result & 1)
                ? ~(result >> 1)
                : (result >> 1);

        lng += dLng;

        points.push([
            lat / 1e5,
            lng / 1e5
        ]);
    }

    return points;
}
